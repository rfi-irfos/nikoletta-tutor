<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Niki Csonka — Language Coaching</title>
<script>
  // SPA redirect for GitHub Pages subpath repos.
  // Encodes the full path+search into a query param so index.html can restore it.
  var segmentCount = 1; // number of path segments in the repo name (/nikoletta-tutor/ = 1)
  var l = window.location;
  var base = l.pathname.split('/').slice(0, 1 + segmentCount).join('/');
  var rest = '/' + l.pathname.slice(1).split('/').slice(segmentCount).join('/');
  if (rest === '/') {
    // Already at base, just go home
    l.replace(l.protocol + '//' + l.host + base + '/');
  } else {
    l.replace(
      l.protocol + '//' + l.host + base +
      '/?p=' + rest.replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  }
</script>
</head>
<body></body>
</html>
