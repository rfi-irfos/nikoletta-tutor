<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FDF8F5"/>
      <stop offset="100%" stop-color="#F5EAE2"/>
    </linearGradient>
    <radialGradient id="g1" cx="35%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#F5D8CC" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FDF8F5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="72%" cy="55%" r="48%">
      <stop offset="0%" stop-color="#DDEEDD" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FDF8F5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="380" fill="url(#bg)"/>
  <rect width="600" height="380" fill="url(#g1)"/>
  <rect width="600" height="380" fill="url(#g2)"/>

  <!-- Background soft orbs -->
  <circle cx="130" cy="140" r="100" fill="#EEC8BC" opacity="0.18"/>
  <circle cx="480" cy="250" r="110" fill="#BCCFBC" opacity="0.18"/>

  <!-- LEFT speech bubble — blush rose -->
  <rect x="55" y="85" width="230" height="140" rx="22" fill="#F2CBBE" opacity="0.92"/>
  <!-- tail -->
  <path d="M120 225 L90 268 L160 228" fill="#F2CBBE" opacity="0.92"/>
  <!-- lines inside -->
  <rect x="80" y="115" width="170" height="10" rx="5" fill="#E8B8AA" opacity="0.5"/>
  <rect x="80" y="133" width="140" height="10" rx="5" fill="#E8B8AA" opacity="0.4"/>
  <rect x="80" y="151" width="155" height="10" rx="5" fill="#E8B8AA" opacity="0.45"/>
  <rect x="80" y="169" width="120" height="10" rx="5" fill="#E8B8AA" opacity="0.35"/>

  <!-- RIGHT speech bubble — sage green -->
  <rect x="315" y="125" width="230" height="140" rx="22" fill="#C4D8C0" opacity="0.88"/>
  <!-- tail -->
  <path d="M480 125 L510 82 L440 122" fill="#C4D8C0" opacity="0.88"/>
  <!-- lines inside -->
  <rect x="340" y="155" width="180" height="10" rx="5" fill="#A8C4A4" opacity="0.45"/>
  <rect x="340" y="173" width="150" height="10" rx="5" fill="#A8C4A4" opacity="0.38"/>
  <rect x="340" y="191" width="165" height="10" rx="5" fill="#A8C4A4" opacity="0.42"/>
  <rect x="340" y="209" width="130" height="10" rx="5" fill="#A8C4A4" opacity="0.32"/>

  <!-- Connection dots between bubbles -->
  <circle cx="295" cy="185" r="8" fill="#E0D0E8" opacity="0.75"/>
  <circle cx="305" cy="200" r="6" fill="#E0D0E8" opacity="0.65"/>
  <circle cx="299" cy="215" r="4.5" fill="#E0D0E8" opacity="0.55"/>

  <!-- Left person (simple, gentle) -->
  <circle cx="108" cy="310" r="38" fill="#EAB8A8"/>
  <path d="M72 314 Q72 264 108 258 Q144 264 144 314" fill="#D4A898" opacity="0.55"/>
  <path d="M70 356 Q70 340 108 338 Q146 340 146 356" fill="#EAB8A8"/>

  <!-- Right person -->
  <circle cx="492" cy="305" r="35" fill="#B8CCAA"/>
  <path d="M458 309 Q458 264 492 258 Q526 264 526 309" fill="#A4BC96" opacity="0.5"/>
  <path d="M457 348 Q457 333 492 331 Q527 333 527 348" fill="#B8CCAA"/>

  <!-- Plant accent -->
  <path d="M28 380 Q36 330 55 305 Q68 288 85 272" stroke="#AABF9E" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="85" cy="272" rx="20" ry="13" fill="#BACCB0" opacity="0.68" transform="rotate(-30 85 272)"/>
  <path d="M572 380 Q564 330 545 305 Q532 288 515 272" stroke="#AABF9E" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="515" cy="272" rx="20" ry="13" fill="#BACCB0" opacity="0.68" transform="rotate(30 515 272)"/>
</svg>
