<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#F5FAFC"/>
      <stop offset="100%" stop-color="#EAF2F8"/>
    </linearGradient>
    <radialGradient id="g1" cx="45%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#D8EEF8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#F5FAFC" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="380" fill="url(#bg)"/>
  <rect width="600" height="380" fill="url(#g1)"/>

  <circle cx="480" cy="280" r="150" fill="#D8E8F8" opacity="0.2"/>
  <circle cx="140" cy="150" r="120" fill="#EAD8F0" opacity="0.18"/>

  <!-- Floating letters / words — playful, soft colors -->
  <!-- Letter A -->
  <circle cx="110" cy="130" r="40" fill="#F0E0F4" opacity="0.85"/>
  <text x="110" y="140" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#C4A8DC" text-anchor="middle" opacity="0.85">A</text>

  <!-- Letter B -->
  <circle cx="220" cy="85" r="34" fill="#D8EDF0" opacity="0.82"/>
  <text x="220" y="95" font-family="Georgia, serif" font-size="24" font-weight="700" fill="#88B8CC" text-anchor="middle" opacity="0.85">B</text>

  <!-- Letter C -->
  <circle cx="390" cy="95" r="36" fill="#F0F0D8" opacity="0.8"/>
  <text x="390" y="107" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#B0B050" text-anchor="middle" opacity="0.82">C</text>

  <!-- Letter D -->
  <circle cx="510" cy="145" r="38" fill="#F4E8E0" opacity="0.82"/>
  <text x="510" y="157" font-family="Georgia, serif" font-size="27" font-weight="700" fill="#D4A088" text-anchor="middle" opacity="0.85">D</text>

  <!-- Smaller letters floating -->
  <circle cx="155" cy="265" r="28" fill="#E8F0F8" opacity="0.78"/>
  <text x="155" y="274" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#90AED0" text-anchor="middle" opacity="0.82">E</text>

  <circle cx="460" cy="235" r="30" fill="#F0E0F4" opacity="0.76"/>
  <text x="460" y="245" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#C0A0D8" text-anchor="middle" opacity="0.82">F</text>

  <circle cx="320" cy="170" r="25" fill="#E8F4E8" opacity="0.75"/>
  <text x="320" y="179" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#88B888" text-anchor="middle" opacity="0.8">G</text>

  <!-- Star shapes (playful) -->
  <circle cx="280" cy="75" r="10" fill="#F0E8A0" opacity="0.82"/>
  <circle cx="440" cy="185" r="8" fill="#F4D8C8" opacity="0.75"/>
  <circle cx="180" cy="198" r="9" fill="#D8ECF0" opacity="0.75"/>

  <!-- Child figure (simple, joyful) -->
  <!-- Jumping child in center -->
  <circle cx="300" cy="258" r="40" fill="#EABBA8"/>
  <path d="M262 262 Q262 226 300 220 Q338 226 338 262" fill="#D8A898" opacity="0.5"/>
  <!-- Body jumping -->
  <rect x="270" y="296" width="60" height="55" rx="14" fill="#EABBA8" opacity="0.82"/>
  <!-- Arms up (joy!) -->
  <path d="M270 315 Q240 290 225 268" stroke="#E8B0A0" stroke-width="22" fill="none" stroke-linecap="round"/>
  <path d="M330 315 Q360 290 375 268" stroke="#E8B0A0" stroke-width="22" fill="none" stroke-linecap="round"/>
  <!-- Legs jumping -->
  <path d="M280 350 Q268 368 258 378" stroke="#E8B0A0" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M320 350 Q332 368 342 378" stroke="#E8B0A0" stroke-width="18" fill="none" stroke-linecap="round"/>

  <!-- Connecting arcs between letters (playful) -->
  <path d="M148 130 Q185 100 220 85" stroke="#D0E4F0" stroke-width="2" fill="none" opacity="0.55" stroke-dasharray="5,4"/>
  <path d="M254 85 Q320 65 390 95" stroke="#E8E4D0" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="5,4"/>
  <path d="M426 95 Q468 118 510 145" stroke="#F0E0D8" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="5,4"/>
</svg>
