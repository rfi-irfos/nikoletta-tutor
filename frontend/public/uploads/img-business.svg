<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#F5F8FC"/>
      <stop offset="100%" stop-color="#EAF0F5"/>
    </linearGradient>
    <radialGradient id="g1" cx="55%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#D0E4F0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#F5F8FC" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="380" fill="url(#bg)"/>
  <rect width="600" height="380" fill="url(#g1)"/>

  <circle cx="480" cy="100" r="140" fill="#C8DCF0" opacity="0.18"/>
  <circle cx="140" cy="280" r="110" fill="#CCDDC8" opacity="0.16"/>

  <!-- Abstract ascending bars / progress — very soft tones -->
  <rect x="90" y="280" width="60" height="80" rx="8" fill="#D0E4D0" opacity="0.75"/>
  <rect x="170" y="230" width="60" height="130" rx="8" fill="#BCCFDC" opacity="0.7"/>
  <rect x="250" y="185" width="60" height="175" rx="8" fill="#B8CCDC" opacity="0.72"/>
  <rect x="330" y="140" width="60" height="220" rx="8" fill="#D0C4E4" opacity="0.7"/>
  <rect x="410" y="100" width="60" height="260" rx="8" fill="#C8D8E8" opacity="0.68"/>

  <!-- Ascending line connecting tops -->
  <polyline points="120,280 200,230 280,185 360,140 440,100" stroke="#B0C4D8" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <!-- Dots on tops -->
  <circle cx="120" cy="280" r="7" fill="#B8CCE0" opacity="0.85"/>
  <circle cx="200" cy="230" r="7" fill="#B8CCE0" opacity="0.85"/>
  <circle cx="280" cy="185" r="7" fill="#B8CCE0" opacity="0.85"/>
  <circle cx="360" cy="140" r="7" fill="#C4B4D8" opacity="0.85"/>
  <circle cx="440" cy="100" r="8" fill="#C4B4D8" opacity="0.9"/>

  <!-- Person presenting (simple abstract) -->
  <circle cx="520" cy="178" r="42" fill="#EABBA8"/>
  <path d="M480 182 Q480 146 520 140 Q560 146 560 182" fill="#D8A898" opacity="0.55"/>
  <rect x="490" y="218" width="60" height="85" rx="14" fill="#EABBA8" opacity="0.85"/>
  <!-- Arm pointing at chart -->
  <path d="M490 250 Q440 230 380 200" stroke="#E8B0A0" stroke-width="22" fill="none" stroke-linecap="round"/>
  <!-- Other arm -->
  <path d="M550 250 Q570 270 575 295" stroke="#E8B0A0" stroke-width="18" fill="none" stroke-linecap="round"/>

  <!-- Ground -->
  <rect x="60" y="358" width="480" height="4" rx="2" fill="#C8D8E0" opacity="0.35"/>

  <!-- Plants -->
  <path d="M30 380 Q40 330 62 304 Q76 286 95 268" stroke="#AABF9E" stroke-width="3" fill="none" stroke-linecap="round"/>
  <ellipse cx="95" cy="268" rx="20" ry="13" fill="#BACCB0" opacity="0.66" transform="rotate(-30 95 268)"/>
</svg>
