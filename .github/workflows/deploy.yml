name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'frontend/public/content.json'
      - 'frontend/public/uploads/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Inject Web3Forms key into research portal
        run: sed -i "s/__WEB3_KEY__/${{ secrets.VITE_WEB3FORMS_KEY }}/g" public/research.html

      - name: Build
        run: npm run build
        env:
          VITE_GH_OWNER:        ${{ secrets.VITE_GH_OWNER }}
          VITE_GH_REPO:         ${{ secrets.VITE_GH_REPO }}
          # VITE_GH_TOKEN intentionally NOT passed: a baked PAT leaks into the
          # public bundle. The admin supplies a fine-grained PAT at login instead.
          VITE_GH_CONTENT_PATH: ${{ vars.VITE_GH_CONTENT_PATH || 'public/content.json' }}
          VITE_GH_UPLOADS_DIR:  ${{ vars.VITE_GH_UPLOADS_DIR  || 'public/uploads' }}
          VITE_ADMIN_HASH:      ${{ secrets.VITE_ADMIN_HASH }}
          VITE_WEB3FORMS_KEY:   ${{ secrets.VITE_WEB3FORMS_KEY }}
          VITE_BASE_URL:        '/nikoletta-tutor/'

      - uses: actions/upload-pages-artifact@v3.0.1
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4.0.5
